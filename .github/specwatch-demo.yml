version: 1

settings:
  changeDetection:
    mode: hash

  validation:
    failOnValidationError: true

apis:
  - name: petstore
    source:
      type: url
      url: https://petstore3.swagger.io/api/v3/openapi.json

    snapshot:
      path: snapshots/petstore.openapi.json

    client:
      language: csharp
      generator: kiota
      output: ../src/Demo/Petstore/Generated
      namespace: Demo.Petstore
      className: PetstoreClient
      cleanOutput: true

    validation:
      commands:
        - dotnet build ../src/Demo/Petstore/Petstore.csproj
