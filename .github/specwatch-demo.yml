version: 1

settings:
  changeDetection:
    mode: hash

  validation:
    failOnValidationError: true

apis:
  - name: payments
    source:
      type: file
      path: ../tests/fixtures/specs/payments-v1.openapi.json

    snapshot:
      path: snapshots/payments.openapi.json

    client:
      language: csharp
      generator: kiota
      output: ../src/Demo/Payments/Generated
      namespace: Demo.Payments
      className: PaymentsClient
      cleanOutput: true

    validation:
      commands:
        - dotnet build ../src/Demo/Payments/Payments.csproj
