name: SpecWatch

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "samples/**"
      - "tests/fixtures/**"
      - ".github/specwatch-demo.yml"
      - ".github/workflows/specwatch.yml"

jobs:
  demo:
    name: Demo run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Kiota
        run: dotnet tool install -g Microsoft.OpenApi.Kiota

      - name: Build specwatch
        run: dotnet publish src/SpecWatch.Cli/SpecWatch.Cli.csproj -c Release -o ./publish --self-contained false

      - name: Validate sample manifest
        run: ./publish/specwatch validate --manifest samples/dotnet-kiota-github/specwatch.yml

      - name: Run specwatch update (generate client + build)
        run: ./publish/specwatch update --manifest .github/specwatch-demo.yml

      - name: Show report
        if: always()
        run: |
          if [ -f .github/specwatch-report.json ]; then
            cat .github/specwatch-report.json
          fi

      - name: Pack generated client
        run: dotnet pack src/Demo/Payments/Payments.csproj -c Release -o ./nupkg --no-build

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Demo.Payments
          path: ./nupkg/*.nupkg
          retention-days: 7
