name: Build and Release Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore SpecWatch.sln

      - name: Publish (${{ matrix.rid }})
        shell: bash
        run: |
          dotnet publish src/SpecWatch.Cli/SpecWatch.Cli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded \
            -o publish/${{ matrix.rid }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          out=publish/${{ matrix.rid }}
          # Bundle the license and readme alongside the binary.
          cp LICENSE README.md "$out/"
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            bin=specwatch.exe
            (cd "$out" && 7z a -tzip "../../stage/specwatch-${{ matrix.rid }}.zip" "$bin" LICENSE README.md)
          else
            bin=specwatch
            chmod +x "$out/$bin"
            tar -C "$out" -czf "stage/specwatch-${{ matrix.rid }}.tar.gz" "$bin" LICENSE README.md
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: specwatch-${{ matrix.rid }}
          path: stage/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          (cd release && sha256sum * > SHA256SUMS.txt)
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
