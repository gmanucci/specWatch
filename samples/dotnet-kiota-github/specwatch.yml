version: 1

settings:
  changeDetection:
    mode: hash

  pullRequest:
    mode: single
    branchPrefix: chore/specwatch
    title: "chore: update generated OpenAPI clients"
    labels:
      - dependencies
      - openapi
      - generated-client

  validation:
    failOnValidationError: true

apis:
  - name: petstore
    enabled: true

    source:
      type: url
      url: https://petstore3.swagger.io/api/v3/openapi.json

    snapshot:
      path: openapi/petstore.openapi.json

    client:
      language: csharp
      generator: kiota
      output: src/Clients/Petstore/Generated
      namespace: Contoso.Clients.Petstore
      className: PetstoreClient
      cleanOutput: true

    validation:
      commands:
        - dotnet build
        - dotnet test
